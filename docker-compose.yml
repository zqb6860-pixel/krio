services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: lightwords-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lightwords
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lightwords-server
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/lightwords?schema=public"
      JWT_SECRET: "${JWT_SECRET:-lightwords-production-secret-key}"
      PORT: "3001"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: ./app/lightwords-web/Dockerfile
    container_name: lightwords-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001/api"
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
